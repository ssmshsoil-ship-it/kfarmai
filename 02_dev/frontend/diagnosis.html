<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AI 진단 — kFarmAI</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
  background: #F5F5F5; color: #1a1a1a; -webkit-font-smoothing: antialiased;
}

/* ── Header ─────────────────────────── */
.header {
  flex-shrink: 0; height: 52px; background: #1B5E20; padding: 0 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { color: #fff; font-size: 18px; font-weight: 500; letter-spacing: -.3px; }
.logo .ai { color: #A5D6A7; }
.hdr-right { display: flex; align-items: center; gap: 14px; }
.lang { display: flex; align-items: center; gap: 4px; cursor: pointer; user-select: none; }
.lang span { font-size: 13px; font-weight: 500; color: rgba(255,255,255,.55); }
.lang .on { color: #fff; }
.lang .sep { color: rgba(255,255,255,.25) !important; }
.notif { background: none; border: none; cursor: pointer; color: rgba(255,255,255,.8); padding: 4px; line-height: 0; }

/* ── Tab bar ────────────────────────── */
.tabbar { flex-shrink: 0; background: #fff; display: flex; border-bottom: 1px solid #E0E0E0; }
.tab {
  flex: 1; padding: 11px 0; text-align: center; font-size: 14px; font-weight: 500;
  color: #9E9E9E; cursor: pointer; user-select: none;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: color .15s, border-color .15s;
}
.tab.active { color: #2E7D32; border-bottom-color: #2E7D32; }

/* ── Scroll area ────────────────────── */
.scroll-area {
  flex: 1; min-height: 0; overflow-y: auto; background: #F5F5F5;
  padding: 10px 12px 12px; display: flex; flex-direction: column;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.scroll-area::-webkit-scrollbar { display: none; }

/* Pull-to-refresh */
.ptr {
  flex-shrink: 0; display: flex; align-items: center; justify-content: center; gap: 8px;
  height: 0; overflow: hidden; color: #2E7D32; font-size: 13px; font-weight: 500;
  transition: height .2s ease;
}
.ptr.visible { height: 44px; }
.ptr-icon { font-size: 18px; transition: transform .3s ease; display: inline-block; }
.ptr-icon.flip { transform: rotate(180deg); }
.ptr-spin {
  width: 18px; height: 18px; border: 2.5px solid #C8E6C9; border-top-color: #2E7D32;
  border-radius: 50%; animation: spin .75s linear infinite; display: none;
}
.ptr-spin.show { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Diagnosis card ─────────────────── */
.diag-card {
  flex: 1; min-height: 0; border: 1.5px solid #4CAF50; border-radius: 14px;
  background: #fff; display: flex; flex-direction: column; position: relative;
}
.card-hd {
  flex-shrink: 0; background: #E8F5E9; border-bottom: 1px solid #C8E6C9;
  border-radius: 13px 13px 0 0; padding: 6px 12px;
  display: flex; align-items: center; gap: 7px;
}
.dot { width: 6px; height: 6px; border-radius: 50%; background: #4CAF50; flex-shrink: 0; }
.card-hd-txt { font-size: 12px; color: #1B5E20; font-weight: 500; }

/* Loading overlay */
.diag-overlay {
  position: absolute; inset: 0; border-radius: 13px;
  background: rgba(255,255,255,.88); z-index: 20;
  display: none; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
}
.diag-overlay.show { display: flex; }
.overlay-spin {
  width: 36px; height: 36px; border: 3px solid #C8E6C9; border-top-color: #2E7D32;
  border-radius: 50%; animation: spin .8s linear infinite;
}
.overlay-txt { font-size: 14px; font-weight: 600; color: #1B5E20; }
.overlay-sub { font-size: 11px; color: #9E9E9E; }

/* Inner */
.inner {
  flex: 1; min-height: 0; padding: 12px;
  display: flex; flex-direction: column; gap: 10px;
}

/* Step indicator */
.steps { flex-shrink: 0; display: flex; align-items: flex-start; justify-content: center; }
.step { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.step-c {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; background: #E0E0E0; color: #9E9E9E;
  transition: background .25s, color .25s;
}
.step-c.on { background: #2E7D32; color: #fff; }
.step-n { font-size: 10px; color: #BDBDBD; transition: color .25s; }
.step-n.on { color: #2E7D32; font-weight: 600; }
.step-line { flex: 1; height: 2px; background: #E0E0E0; margin: 12px 6px 0; min-width: 20px; max-width: 56px; }

/* Input view */
#inputView { flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 10px; }

/* Camera area */
.cam-wrap {
  flex: 1; min-height: 160px; background: #1a2a1a; border-radius: 10px;
  position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.cam-hint {
  position: absolute; top: 10px; left: 0; right: 0;
  text-align: center; color: rgba(255,255,255,.65); font-size: 11.5px;
  z-index: 5; pointer-events: none;
}
#camVideo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; }
.cam-fb {
  color: rgba(255,255,255,.7); font-size: 13px;
  text-align: center; line-height: 1.6; padding: 20px; z-index: 2;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.guide {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  z-index: 4; pointer-events: none; overflow: hidden;
}
.c { position: absolute; width: 20px; height: 20px; border-style: solid; border-color: #4CAF50; border-width: 0; }
.c-tl { top:0; left:0;   border-top-width:2.5px; border-left-width:2.5px;  border-radius:3px 0 0 0; }
.c-tr { top:0; right:0;  border-top-width:2.5px; border-right-width:2.5px; border-radius:0 3px 0 0; }
.c-bl { bottom:0; left:0;  border-bottom-width:2.5px; border-left-width:2.5px;  border-radius:0 0 0 3px; }
.c-br { bottom:0; right:0; border-bottom-width:2.5px; border-right-width:2.5px; border-radius:0 0 3px 0; }
.scan { position: absolute; left: 0; right: 0; height: 1.5px; background: #4CAF50; opacity: .7; animation: scan 2s linear infinite; }
@keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
.cam-btns {
  position: absolute; bottom: 12px; left: 0; right: 0;
  display: flex; align-items: center; justify-content: center; gap: 36px; z-index: 6;
}
.cam-btn {
  width: 44px; height: 44px; border-radius: 50%; background: rgba(0,0,0,.45);
  border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: #fff; -webkit-tap-highlight-color: transparent;
}
.cam-btn:active { background: rgba(0,0,0,.65); }
.shutter {
  width: 60px; height: 60px; border-radius: 50%; border: 3px solid rgba(255,255,255,.9);
  background: transparent; cursor: pointer; padding: 0;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.shutter-in { width: 48px; height: 48px; border-radius: 50%; background: #fff; }
.shutter:active .shutter-in { opacity: .8; }
.img-badge {
  position: absolute; top: 8px; right: 8px; z-index: 7;
  background: #2E7D32; color: #fff; font-size: 11px; font-weight: 700;
  padding: 3px 8px; border-radius: 6px; display: none;
}
.img-badge.show { display: block; }

/* Crop selection */
.crop-sec { flex-shrink: 0; }
.crop-lbl-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.crop-badge {
  width: 20px; height: 20px; border-radius: 50%; background: #2E7D32; color: #fff;
  font-size: 11px; font-weight: 700; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.crop-lbl { font-size: 13px; font-weight: 600; }
.crop-opt { font-size: 11px; color: #9E9E9E; }
.pills { display: flex; gap: 7px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
.pills::-webkit-scrollbar { display: none; }
.pill {
  flex-shrink: 0; padding: 6px 14px; border-radius: 999px;
  border: 1px solid #E0E0E0; background: #fff; font-size: 13px; font-weight: 500; color: #555;
  cursor: pointer; white-space: nowrap;
  transition: background .15s, color .15s, border-color .15s;
  -webkit-tap-highlight-color: transparent;
}
.pill.on { background: #2E7D32; color: #fff; border-color: #2E7D32; }

/* Symptom section */
.symptom-wrap { flex-shrink: 0; }
.symptom-label {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; font-weight: 600; margin-bottom: 8px;
}
.num-badge {
  width: 20px; height: 20px; border-radius: 50%; background: #2E7D32; color: #fff;
  font-size: 11px; font-weight: 700; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.optional { font-size: 11px; color: #9E9E9E; font-weight: 400; }
#symptomInput {
  display: block; width: 100%;
  border: 1px solid #C8E6C9; border-radius: 8px;
  padding: 10px 12px; font-size: 14px; font-family: inherit;
  resize: none; outline: none; color: #1a1a1a; background: #fff;
  line-height: 1.5; overflow: hidden;
  transition: border-color .15s;
}
#symptomInput:focus { border-color: #2E7D32; }
#symptomInput::placeholder { color: #BDBDBD; }
.char-count { text-align: right; font-size: 11px; color: #9E9E9E; margin-top: 4px; }

/* Start button */
.diag-btn-wrap { flex-shrink: 0; position: sticky; bottom: 0; padding-top: 4px; }
.diag-btn {
  width: 100%; background: #1B5E20; border: none; border-radius: 12px; padding: 14px;
  cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px;
  -webkit-tap-highlight-color: transparent; transition: background .15s;
}
.diag-btn:active:not(:disabled) { background: #154a18; }
.diag-btn:disabled { opacity: .65; cursor: not-allowed; }
.diag-btn-main { color: #fff; font-size: 16px; font-weight: 500; font-family: inherit; display: flex; align-items: center; gap: 8px; }
.diag-btn-sub  { color: rgba(255,255,255,.75); font-size: 11px; font-family: inherit; }
.btn-spin {
  display: none; width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,.35); border-top-color: #fff;
  border-radius: 50%; animation: spin .75s linear infinite; flex-shrink: 0;
}
.btn-spin.show { display: inline-block; }

/* Result view */
#resultView { flex: 1; min-height: 0; overflow-y: auto; display: none; scrollbar-width: none; }
#resultView::-webkit-scrollbar { display: none; }

/* Result card */
.result-card {
  border: 1.5px solid #4CAF50; border-radius: 14px; padding: 16px;
  animation: slideUp .35s ease;
}
@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
.result-header { margin-bottom: 14px; }
.result-badge {
  display: inline-block; font-size: 11px; padding: 2px 8px;
  border-radius: 10px; margin-bottom: 6px; font-weight: 700;
}
.result-badge.urgent { background: #FFEBEE; color: #B71C1C; }
.result-title { font-size: 20px; font-weight: 500; color: #1B5E20; line-height: 1.3; }
.result-confidence { font-size: 13px; margin-top: 4px; font-weight: 500; }
.result-confidence.high { color: #2E7D32; }
.result-confidence.mid  { color: #E65100; }
.result-confidence.low  { color: #B71C1C; }
.result-section { margin-bottom: 12px; }
.result-section-label { font-size: 12px; color: #9E9E9E; margin-bottom: 4px; font-weight: 500; }
.result-section-body { font-size: 14px; color: #212121; line-height: 1.6; }
.result-list { list-style: none; padding: 0; }
.result-list li { font-size: 14px; color: #212121; line-height: 1.8; }
.result-list li::before { content: "✓ "; color: #2E7D32; }
.result-actions { display: flex; gap: 8px; margin-top: 14px; }
.btn-retry {
  flex: 1; border: 1px solid #2E7D32; color: #2E7D32; background: #fff;
  border-radius: 8px; padding: 10px; font-size: 14px; font-weight: 500;
  font-family: inherit; cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.btn-retry:active { background: #F1F8E9; }
.btn-share {
  flex: 1; background: #1B5E20; color: #fff; border: none;
  border-radius: 8px; padding: 10px; font-size: 14px; font-weight: 500;
  font-family: inherit; cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.btn-share:active { background: #154a18; }

/* Toast */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: rgba(20,20,20,.88); color: #fff;
  padding: 9px 20px; border-radius: 999px;
  font-size: 13px; font-weight: 500;
  z-index: 999; opacity: 0; pointer-events: none; white-space: nowrap;
  transition: opacity .2s, transform .2s;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="logo">kFarm<span class="ai">AI</span></div>
  <div class="hdr-right">
    <div class="lang" id="langBtn">
      <span class="on" id="lKR">KR</span>
      <span class="sep">|</span>
      <span id="lEN">EN</span>
    </div>
    <button class="notif" aria-label="알림">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
    </button>
  </div>
</header>

<!-- Tab bar -->
<nav class="tabbar">
  <div class="tab">커뮤니티</div>
  <div class="tab active">AI 진단</div>
  <div class="tab">농자재</div>
</nav>

<!-- Scroll area -->
<div class="scroll-area" id="scrollArea">

  <!-- Pull-to-refresh -->
  <div class="ptr" id="ptr">
    <div class="ptr-spin" id="ptrSpin"></div>
    <span class="ptr-icon" id="ptrIcon">↓</span>

  <!-- Diagnosis card -->
  <div class="diag-card">
    <div class="card-hd">
      <div class="dot"></div>
      <span class="card-hd-txt">AI 진단 구역</span>
    </div>

    <!-- Loading overlay -->
    <div class="diag-overlay" id="diagOverlay">
      <div class="overlay-spin"></div>
      <div class="overlay-txt">AI가 분석하고 있어요</div>
      <div class="overlay-sub">보통 15~30초 소요됩니다</div>

    <div class="inner">

      <!-- Step indicator -->
      <div class="steps">
        <div class="step">
          <div class="step-c on" id="s1">1</div>
          <div class="step-n on">사진</div>
        </div>
        <div class="step-line"></div>
        <div class="step">
          <div class="step-c" id="s2">2</div>
          <div class="step-n">작물</div>
        </div>
        <div class="step-line"></div>
        <div class="step">
          <div class="step-c" id="s3">3</div>
          <div class="step-n">결과</div>
        </div>
      </div>

      <!-- Input view -->
      <div id="inputView">

        <!-- Camera -->
        <div class="cam-wrap" id="camWrap">
          <div class="cam-hint">아픈 잎·줄기·열매를 프레임 안에</div>
          <video id="camVideo" autoplay playsinline muted></video>
          <div class="cam-fb" id="camFb">
            <div style="font-size:32px;margin-bottom:8px">📷</div>
            <div>카메라 시작 중...</div>
          </div>
          <div class="guide" id="guide">
            <div class="c c-tl"></div><div class="c c-tr"></div>
            <div class="c c-bl"></div><div class="c c-br"></div>
            <div class="scan"></div>
          </div>
          <div class="img-badge" id="imgBadge">📸 사진 선택됨</div>
          <div class="cam-btns">
            <button class="cam-btn" onclick="openAlbum()" aria-label="앨범">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"

                <rect x="3" y="3" width="18" height="18" rx="3"/>

                <polyline points="21 15 16 10 5 21"/>

            <button class="shutter" onclick="capturePhoto()" aria-label="촬영">

            </button>
            <button class="cam-btn" onclick="flipCamera()" aria-label="전면/후면 전환">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"

                <path d="M1 4v6h6"/>
                <path d="M23 20v-6h-6"/>

            </button>
          </div>

        <!-- Crop selection -->
        <div class="crop-sec">
          <div class="crop-lbl-row">
            <div class="crop-badge">2</div>
            <span class="crop-lbl">작물 선택</span>
            <span class="crop-opt">(선택)</span>
          </div>
          <div class="pills" id="pills">
            <div class="pill on" data-crop="전체">전체</div>
            <div class="pill" data-crop="토마토">토마토</div>
            <div class="pill" data-crop="고추">고추</div>
            <div class="pill" data-crop="상추">상추</div>
            <div class="pill" data-crop="오이">오이</div>
            <div class="pill" data-crop="벼">벼</div>
            <div class="pill" data-crop="딸기">딸기</div>
            <div class="pill" data-crop="감자">감자</div>
          </div>
        </div>

        <!-- Symptom input -->
        <div class="symptom-wrap">
          <div class="symptom-label">
            <span class="num-badge">3</span>
            증상을 입력하세요
            <span class="optional">(선택)</span>
          </div>
          <textarea
            id="symptomInput"
            placeholder="예) 잎이 노랗게 변해요 / 줄기에 검은 반점이 생겼어요 / 벌레가 보여요"
            rows="2"
            maxlength="200"
          ></textarea>
          <div class="char-count"><span id="charCount">0</span>/200</div>
        </div>

        <!-- Start button -->
        <div class="diag-btn-wrap">
          <button class="diag-btn" id="diagBtn" onclick="startDiagnosis()">
            <span class="diag-btn-main">
              <span class="btn-spin" id="btnSpin"></span>
              <span id="btnText">🔍 AI 진단 시작</span>
            </span>
            <span class="diag-btn-sub" id="btnSub">30초 안에 결과를 드려요</span>
          </button>
        </div>

      </div><!-- /inputView -->

      <!-- Result view (populated by JS) -->
      <div id="resultView"></div>

    </div><!-- /inner -->
  </div><!-- /diag-card -->

</div><!-- /scroll-area -->

<script>
'use strict';

// TODO: Edge Function 교체 필요 — API 키를 프론트엔드에 직접 노출하지 마세요
const API_KEY = 'YOUR_API_KEY_HERE';

const SYSTEM_PROMPT = `당신은 농업 전문가 AI입니다.
사용자가 제공한 사진과 증상 설명을 바탕으로
작물의 병해충, 영양 상태, 환경 스트레스를 진단합니다.
반드시 아래 JSON 형식으로만 응답하세요. 다른 텍스트 없이 JSON만 출력:
{
  "diagnosis": "진단명 (20자 이내)",
  "confidence": "높음/보통/낮음",
  "cause": "원인 설명 (50자 이내)",
  "solution": ["대처방법1", "대처방법2", "대처방법3"],
  "prevention": "예방법 (50자 이내)",
  "urgent": true
}`;

/* ── State ───────────────────────────── */
let capturedFile = null;
let lastResult   = null;

/* ── Toast ───────────────────────────── */
let _tt;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(() => t.classList.remove('show'), 2500);
}

/* ── Tabs ────────────────────────────── */
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
  });
});

/* ── Language ────────────────────────── */
let curLang = 'ko';
document.getElementById('langBtn').addEventListener('click', () => {
  curLang = curLang === 'ko' ? 'en' : 'ko';
  document.getElementById('lKR').classList.toggle('on', curLang === 'ko');
  document.getElementById('lEN').classList.toggle('on', curLang === 'en');

/* ── Camera ──────────────────────────── */
let stream = null;
let facing = 'environment';
const video  = document.getElementById('camVideo');
const camFb  = document.getElementById('camFb');
const secure = location.protocol === 'https:' || ['localhost', '127.0.0.1'].includes(location.hostname);

function setFallback(html) {
  video.style.display = 'none';
  camFb.innerHTML = html;
  camFb.style.display = 'flex';
}

async function startCamera(facingMode) {
  if (!secure) {
    setFallback(`<div style="font-size:28px;margin-bottom:8px">📷</div>
      <div>HTTP 환경에서는 앨범만 지원합니다</div>
      <div style="font-size:11px;margin-top:4px;opacity:.7">↓ 아래 앨범 버튼을 사용하세요</div>`);
    return;
  }
  if (!navigator.mediaDevices?.getUserMedia) {
    setFallback('<div>이 브라우저는 카메라를 지원하지 않습니다</div>');
    return;
  }
  try {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode }, audio: false });
    video.srcObject = stream;
    video.style.display = 'block';
    camFb.style.display = 'none';
  } catch (err) {
    const denied = err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError';
    setFallback(denied
      ? `<div style="font-size:28px;margin-bottom:8px">🚫</div>
         <div>카메라 권한이 필요합니다</div>
         <div style="font-size:11px;margin-top:4px;opacity:.7">설정에서 허용 후 새로고침하세요</div>`
      : `<div style="font-size:28px;margin-bottom:8px">⚠️</div>
         <div>카메라를 시작할 수 없습니다</div>
         <div style="font-size:11px;margin-top:4px;opacity:.7">앨범 버튼을 이용하세요</div>`);
  }
}

function flipCamera() {
  facing = facing === 'environment' ? 'user' : 'environment';
  startCamera(facing);
}

function capturePhoto() {
  if (!stream || !video.videoWidth) {
    showToast('카메라가 준비되지 않았습니다');
    return;
  }
  const canvas = document.createElement('canvas');
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  canvas.toBlob(blob => {
    capturedFile = new File([blob], 'capture.jpg', { type: 'image/jpeg' });
    document.getElementById('imgBadge').classList.add('show');
    showToast('사진이 촬영되었습니다 ✓');
  }, 'image/jpeg', 0.85);
}

function openAlbum() { document.getElementById('albumInput').click(); }

function handleAlbumFile(input) {
  const file = input.files[0];
  if (!file) return;
  capturedFile = file;
  document.getElementById('imgBadge').classList.add('show');
  showToast('이미지가 선택되었습니다 ✓');
  input.value = '';
}

/* ── Guide frame ─────────────────────── */
function sizeGuide() {
  const wrap  = document.getElementById('camWrap');
  const guide = document.getElementById('guide');
  const w = wrap.offsetWidth;
  guide.style.width  = Math.round(w * 0.55) + 'px';
  guide.style.height = Math.round(w * 0.55 * 0.75) + 'px';
}

/* ── Crop pills ──────────────────────── */
document.getElementById('pills').addEventListener('click', e => {
  const p = e.target.closest('.pill');
  if (!p) return;
  document.querySelectorAll('.pill').forEach(x => x.classList.remove('on'));
  p.classList.add('on');
});

/* ── Symptom textarea ────────────────── */
const symptomEl  = document.getElementById('symptomInput');
const charCountEl = document.getElementById('charCount');
symptomEl.addEventListener('input', () => {
  charCountEl.textContent = symptomEl.value.length;
  symptomEl.style.height = 'auto';
  symptomEl.style.height = symptomEl.scrollHeight + 'px';
});

/* ── Step indicator ──────────────────── */
function setStep(n) {
  [1, 2, 3].forEach(i => {
    const circle = document.getElementById('s' + i);
    const label  = circle?.nextElementSibling;
    circle?.classList.toggle('on', i <= n);
    label?.classList.toggle('on', i <= n);
  });
}

/* ── Loading ─────────────────────────── */
function setLoading(on) {
  const btn     = document.getElementById('diagBtn');
  const btnSpin = document.getElementById('btnSpin');
  const btnText = document.getElementById('btnText');
  const btnSub  = document.getElementById('btnSub');
  const overlay = document.getElementById('diagOverlay');
  btn.disabled = on;
  btnSpin.classList.toggle('show', on);
  btnText.textContent  = on ? '분석 중...' : '🔍 AI 진단 시작';
  btnSub.style.display = on ? 'none' : '';
  overlay.classList.toggle('show', on);
}

/* ── Helpers ─────────────────────────── */
function toBase64(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.readAsDataURL(file);
  });
}

function escHtml(s) {
  return String(s || '').replace(/[&<>"']/g,
    c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

/* ── Diagnosis ───────────────────────── */
async function startDiagnosis() {
  const crop    = document.querySelector('.pill.on')?.dataset.crop || '미선택';
  const symptom = symptomEl.value.trim();

  if (!capturedFile && !symptom) {
    showToast('사진을 찍거나 증상을 입력해주세요');
    return;
  }

  setLoading(true);

  try {
    const userContent = [];

    if (capturedFile) {
      const base64    = await toBase64(capturedFile);
      const mediaType = capturedFile.type.startsWith('image/') ? capturedFile.type : 'image/jpeg';
      userContent.push({
        type: 'image',
        source: { type: 'base64', media_type: mediaType, data: base64 }
      });
    }

    userContent.push({
      type: 'text',
      text: `작물: ${crop}\n증상: ${symptom || '텍스트 없음, 사진만으로 판단해주세요'}`
    });

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY, // TODO: Edge Function 교체 필요
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: 1024,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: userContent }]
      })
    });

    if (!res.ok) throw new Error('API_' + res.status);

    const data = await res.json();
    const raw  = data.content?.[0]?.text || '';

    let result;
    try {
      // Claude가 가끔 JSON을 마크다운 펜스로 감쌀 때 대비
      const clean = raw.replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/, '').trim();
      result = JSON.parse(clean);
    } catch {
      throw new Error('PARSE_ERROR');
    }

    lastResult = result;
    showResult(result);

  } catch (err) {
    setLoading(false);
    if (err.message === 'PARSE_ERROR') {
      showToast('진단 결과를 불러오지 못했습니다. 다시 시도해주세요');
    } else if (err.message.startsWith('API_')) {
      showToast('서버 오류가 발생했습니다 (' + err.message.replace('API_', '') + ')');
    } else if (err.name === 'TypeError') {
      showToast('네트워크 연결을 확인해주세요');
    } else {
      showToast('진단에 실패했습니다. 다시 시도해주세요');
    }
  }
}

function showResult(result) {
  setLoading(false);
  setStep(3);

  document.getElementById('inputView').style.display = 'none';
  const rv = document.getElementById('resultView');
  rv.style.display = 'block';

  const confMap     = { '높음': 'high', '보통': 'mid', '낮음': 'low' };
  const confClass   = confMap[result.confidence] || 'mid';
  const urgentBadge = result.urgent ? '<div class="result-badge urgent">긴급</div>' : '';
  const solutions   = (result.solution || []).map(s => `<li>${escHtml(s)}</li>`).join('');

  rv.innerHTML = `
    <div class="result-card">
      <div class="result-header">
        ${urgentBadge}
        <div class="result-title">${escHtml(result.diagnosis)}</div>
        <div class="result-confidence ${confClass}">신뢰도: ${escHtml(result.confidence)}</div>
      </div>
      <div class="result-section">
        <div class="result-section-label">원인</div>
        <div class="result-section-body">${escHtml(result.cause)}</div>
      </div>
      <div class="result-section">
        <div class="result-section-label">대처 방법</div>
        <ul class="result-list">${solutions}</ul>
      </div>
      <div class="result-section">
        <div class="result-section-label">예방법</div>
        <div class="result-section-body">${escHtml(result.prevention)}</div>
      </div>
      <div class="result-actions">
        <button class="btn-retry" onclick="resetDiagnosis()">다시 진단하기</button>
        <button class="btn-share" onclick="shareToCommunity()">커뮤니티에 공유</button>
      </div>
    </div>`;
}

function resetDiagnosis() {
  capturedFile = null;
  lastResult   = null;

  setStep(1);
  setLoading(false);

  document.getElementById('inputView').style.display = '';
  const rv = document.getElementById('resultView');
  rv.style.display = 'none';
  rv.innerHTML = '';

  symptomEl.value          = '';
  symptomEl.style.height   = 'auto';
  charCountEl.textContent  = '0';

  document.querySelectorAll('.pill').forEach((p, i) => p.classList.toggle('on', i === 0));
  document.getElementById('imgBadge').classList.remove('show');
}

function shareToCommunity() {
  console.log('커뮤니티 공유 결과:', lastResult);
  showToast('커뮤니티 공유 기능은 준비 중입니다');
  // TODO: post.html 또는 글쓰기 모달 연결 + 진단 결과 텍스트 자동 입력
}

/* ── Pull-to-refresh ─────────────────── */
(function () {
  const area = document.getElementById('scrollArea');
  const ptr  = document.getElementById('ptr');
  const spin = document.getElementById('ptrSpin');
  const icon = document.getElementById('ptrIcon');
  const txt  = document.getElementById('ptrTxt');
  const THRESHOLD = 60;
  let sy = 0, dy = 0, pulling = false, loading = false;

  function set(s) {
    if (s === 'idle') {
      ptr.classList.remove('visible');
      icon.style.display = 'inline'; icon.classList.remove('flip');
      spin.classList.remove('show'); txt.textContent = '당겨서 새로고침';
    } else if (s === 'pulling') {
      ptr.classList.add('visible');
      icon.style.display = 'inline'; icon.classList.remove('flip');
      spin.classList.remove('show'); txt.textContent = '당겨서 새로고침';
    } else if (s === 'ready') {
      ptr.classList.add('visible');
      icon.style.display = 'inline'; icon.classList.add('flip');
      spin.classList.remove('show'); txt.textContent = '놓아서 새로고침';
    } else if (s === 'loading') {
      ptr.classList.add('visible');
      icon.style.display = 'none'; spin.classList.add('show');
      txt.textContent = '새로고침 중...';
    }
  }

  area.addEventListener('touchstart', e => {
    if (loading) return;
    sy = e.touches[0].clientY; pulling = area.scrollTop === 0; dy = 0;
  }, { passive: true });
  area.addEventListener('touchmove', e => {
    if (!pulling || loading) return;
    dy = e.touches[0].clientY - sy;
    if (dy <= 0) { set('idle'); return; }
    set(dy >= THRESHOLD ? 'ready' : 'pulling');
  }, { passive: true });
  area.addEventListener('touchend', () => {
    if (!pulling || loading) return;
    pulling = false;
    if (dy >= THRESHOLD) {
      loading = true; set('loading');
      setTimeout(() => { loading = false; set('idle'); showToast('업데이트 완료'); }, 1500);
    } else { set('idle'); }
    dy = 0;
  }, { passive: true });
})();

  startCamera(facing);
