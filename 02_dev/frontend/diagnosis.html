<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AI 진단 — kFarmAI</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
  background: #F5F5F5;
  color: #1a1a1a;
  -webkit-font-smoothing: antialiased;
}

/* ── [1] Header ─────────────────────────── */
.header {
  flex-shrink: 0;
  height: 52px;
  background: #1B5E20;
  padding: 0 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo { color: #fff; font-size: 18px; font-weight: 500; letter-spacing: -.3px; }
.logo .ai { color: #A5D6A7; }
.hdr-right { display: flex; align-items: center; gap: 14px; }
.lang { display: flex; align-items: center; gap: 4px; cursor: pointer; user-select: none; }
.lang span { font-size: 13px; font-weight: 500; color: rgba(255,255,255,.55); }
.lang .on  { color: #fff; }
.lang .sep { color: rgba(255,255,255,.25) !important; }
.notif {
  background: none; border: none; cursor: pointer;
  color: rgba(255,255,255,.8); padding: 4px; line-height: 0;
}

/* ── [2] Tab bar ────────────────────────── */
.tabbar { flex-shrink: 0; background: #fff; display: flex; border-bottom: 1px solid #E0E0E0; }
.tab {
  flex: 1; padding: 11px 0; text-align: center;
  font-size: 14px; font-weight: 500; color: #9E9E9E;
  cursor: pointer; user-select: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color .15s, border-color .15s;
}
.tab.active { color: #2E7D32; border-bottom-color: #2E7D32; }

/* ── [3] Scroll area ────────────────────── */
.scroll-area {
  flex: 1; min-height: 0;
  overflow-y: auto;
  background: #F5F5F5;
  padding: 10px 12px 12px;
  display: flex; flex-direction: column;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.scroll-area::-webkit-scrollbar { display: none; }

/* Pull-to-refresh */
.ptr {
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  height: 0; overflow: hidden;
  color: #2E7D32; font-size: 13px; font-weight: 500;
  transition: height .2s ease;
}
.ptr.visible { height: 44px; }
.ptr-icon { font-size: 18px; transition: transform .3s ease; display: inline-block; }
.ptr-icon.flip { transform: rotate(180deg); }
.ptr-spin {
  width: 18px; height: 18px;
  border: 2.5px solid #C8E6C9; border-top-color: #2E7D32;
  border-radius: 50%; animation: spin .75s linear infinite;
  display: none;
}
.ptr-spin.show { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── [3-1] Diagnosis card ───────────────── */
.diag-card {
  flex: 1; min-height: 0;
  border: 1.5px solid #4CAF50; border-radius: 14px;
  background: #fff;
  display: flex; flex-direction: column;
}

/* [3-1-a] Card header label */
.card-hd {
  flex-shrink: 0;
  background: #E8F5E9;
  border-bottom: 1px solid #C8E6C9;
  border-radius: 13px 13px 0 0;
  padding: 6px 12px;
  display: flex; align-items: center; gap: 7px;
}
.dot { width: 6px; height: 6px; border-radius: 50%; background: #4CAF50; flex-shrink: 0; }
.card-hd-txt { font-size: 12px; color: #1B5E20; font-weight: 500; }

/* [3-1-b] Inner padding area */
.inner {
  flex: 1; min-height: 0;
  padding: 12px;
  display: flex; flex-direction: column; gap: 10px;
}

/* Step indicator */
.steps {
  flex-shrink: 0;
  display: flex; align-items: flex-start; justify-content: center;
}
.step { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.step-c {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600;
  background: #E0E0E0; color: #9E9E9E;
}
.step-c.on { background: #2E7D32; color: #fff; }
.step-n { font-size: 10px; color: #BDBDBD; }
.step-n.on { color: #2E7D32; font-weight: 600; }
.step-line { flex: 1; height: 2px; background: #E0E0E0; margin: 12px 6px 0; min-width: 20px; max-width: 56px; }

/* Camera area */
.cam-wrap {
  flex: 1; min-height: 160px;
  background: #1a2a1a; border-radius: 10px;
  position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.cam-hint {
  position: absolute; top: 10px; left: 0; right: 0;
  text-align: center; color: rgba(255,255,255,.65); font-size: 11.5px;
  z-index: 5; pointer-events: none;
}
#camVideo {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover; display: none;
}
.cam-fb {
  color: rgba(255,255,255,.7); font-size: 13px;
  text-align: center; line-height: 1.6; padding: 20px; z-index: 2;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}

/* Corner guide frame */
.guide {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 4; pointer-events: none; overflow: hidden;
}
.c {
  position: absolute; width: 20px; height: 20px;
  border-style: solid; border-color: #4CAF50; border-width: 0;
}
.c-tl { top:0; left:0;   border-top-width:2.5px; border-left-width:2.5px;  border-radius:3px 0 0 0; }
.c-tr { top:0; right:0;  border-top-width:2.5px; border-right-width:2.5px; border-radius:0 3px 0 0; }
.c-bl { bottom:0; left:0;  border-bottom-width:2.5px; border-left-width:2.5px;  border-radius:0 0 0 3px; }
.c-br { bottom:0; right:0; border-bottom-width:2.5px; border-right-width:2.5px; border-radius:0 0 3px 0; }
.scan {
  position: absolute; left: 0; right: 0;
  height: 1.5px; background: #4CAF50; opacity: .7;
  animation: scan 2s linear infinite;
}
@keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

/* Camera bottom buttons */
.cam-btns {
  position: absolute; bottom: 12px; left: 0; right: 0;
  display: flex; align-items: center; justify-content: center; gap: 36px; z-index: 6;
}
.cam-btn {
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(0,0,0,.45); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; color: #fff;
  -webkit-tap-highlight-color: transparent;
}
.cam-btn:active { background: rgba(0,0,0,.65); }
.shutter {
  width: 60px; height: 60px; border-radius: 50%;
  border: 3px solid rgba(255,255,255,.9); background: transparent;
  cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.shutter-in { width: 48px; height: 48px; border-radius: 50%; background: #fff; }
.shutter:active .shutter-in { opacity: .8; }

/* Crop selection */
.crop-sec { flex-shrink: 0; }
.crop-lbl-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.crop-badge {
  width: 20px; height: 20px; border-radius: 50%;
  background: #2E7D32; color: #fff;
  font-size: 11px; font-weight: 700; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.crop-lbl { font-size: 13px; font-weight: 600; }
.crop-opt { font-size: 11px; color: #9E9E9E; }
.pills {
  display: flex; gap: 7px; overflow-x: auto;
  scrollbar-width: none; padding-bottom: 2px;
}
.pills::-webkit-scrollbar { display: none; }
.pill {
  flex-shrink: 0; padding: 6px 14px; border-radius: 999px;
  border: 1px solid #E0E0E0; background: #fff;
  font-size: 13px; font-weight: 500; color: #555;
  cursor: pointer; white-space: nowrap;
  transition: background .15s, color .15s, border-color .15s;
  -webkit-tap-highlight-color: transparent;
}
.pill.on { background: #2E7D32; color: #fff; border-color: #2E7D32; }

/* Diagnosis start button */
.diag-btn-wrap {
  flex-shrink: 0;
  position: sticky; bottom: 0;
  padding-top: 4px;
}
.diag-btn {
  width: 100%; background: #1B5E20; border: none; border-radius: 12px;
  padding: 14px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  -webkit-tap-highlight-color: transparent;
}
.diag-btn:active { background: #154a18; }
.diag-btn-main { color: #fff; font-size: 16px; font-weight: 500; font-family: inherit; }
.diag-btn-sub  { color: rgba(255,255,255,.75); font-size: 11px; font-family: inherit; }

/* Toast */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: rgba(20,20,20,.88); color: #fff;
  padding: 9px 20px; border-radius: 999px;
  font-size: 13px; font-weight: 500;
  z-index: 999; opacity: 0; pointer-events: none;
  white-space: nowrap;
  transition: opacity .2s, transform .2s;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- [1] Header -->
<header class="header">
  <div class="logo">kFarm<span class="ai">AI</span></div>
  <div class="hdr-right">
    <div class="lang" id="langBtn">
      <span class="on"  id="lKR">KR</span>
      <span class="sep">|</span>
      <span id="lEN">EN</span>
    </div>
    <button class="notif" aria-label="알림">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
    </button>
  </div>
</header>

<!-- [2] Tab bar -->
<nav class="tabbar">
  <div class="tab">커뮤니티</div>
  <div class="tab active">AI 진단</div>
  <div class="tab">농자재</div>
</nav>

<!-- [3] Scroll area -->
<div class="scroll-area" id="scrollArea">

  <!-- Pull-to-refresh indicator -->
  <div class="ptr" id="ptr">
    <div class="ptr-spin" id="ptrSpin"></div>
    <span class="ptr-icon" id="ptrIcon">↓</span>
    <span id="ptrTxt">당겨서 새로고침</span>
  </div>

  <!-- [3-1] AI 진단 구역 카드 -->
  <div class="diag-card">

    <!-- [3-1-a] Header label -->
    <div class="card-hd">
      <div class="dot"></div>
      <span class="card-hd-txt">AI 진단 구역</span>
    </div>

    <!-- [3-1-b] Inner -->
    <div class="inner">

      <!-- Step indicator -->
      <div class="steps">
        <div class="step">
          <div class="step-c on">1</div>
          <div class="step-n on">사진</div>
        </div>
        <div class="step-line"></div>
        <div class="step">
          <div class="step-c">2</div>
          <div class="step-n">작물</div>
        </div>
        <div class="step-line"></div>
        <div class="step">
          <div class="step-c">3</div>
          <div class="step-n">결과</div>
        </div>
      </div>

      <!-- Camera area -->
      <div class="cam-wrap" id="camWrap">
        <div class="cam-hint">아픈 잎·줄기·열매를 프레임 안에</div>

        <video id="camVideo" autoplay playsinline muted></video>

        <div class="cam-fb" id="camFb">
          <div style="font-size:32px;margin-bottom:8px">📷</div>
          <div>카메라 시작 중...</div>
        </div>

        <!-- Corner guide frame (sized by JS) -->
        <div class="guide" id="guide">
          <div class="c c-tl"></div>
          <div class="c c-tr"></div>
          <div class="c c-bl"></div>
          <div class="c c-br"></div>
          <div class="scan"></div>
        </div>

        <!-- Bottom buttons -->
        <div class="cam-btns">
          <button class="cam-btn" onclick="openAlbum()" aria-label="앨범">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="3"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
          </button>
          <button class="shutter" onclick="capturePhoto()" aria-label="촬영">
            <div class="shutter-in"></div>
          </button>
          <button class="cam-btn" onclick="flipCamera()" aria-label="전면/후면 전환">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 4v6h6"/>
              <path d="M23 20v-6h-6"/>
              <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10"/>
              <path d="M3.51 15A9 9 0 0 0 18.36 18.36L23 14"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Crop selection -->
      <div class="crop-sec">
        <div class="crop-lbl-row">
          <div class="crop-badge">2</div>
          <span class="crop-lbl">작물 선택</span>
          <span class="crop-opt">(선택)</span>
        </div>
        <div class="pills" id="pills">
          <div class="pill on" data-crop="전체">전체</div>
          <div class="pill" data-crop="토마토">토마토</div>
          <div class="pill" data-crop="고추">고추</div>
          <div class="pill" data-crop="상추">상추</div>
          <div class="pill" data-crop="오이">오이</div>
          <div class="pill" data-crop="벼">벼</div>
          <div class="pill" data-crop="딸기">딸기</div>
          <div class="pill" data-crop="감자">감자</div>
        </div>
      </div>

      <!-- AI 진단 시작 버튼 (sticky) -->
      <div class="diag-btn-wrap">
        <button class="diag-btn" onclick="startDiagnosis()">
          <span class="diag-btn-main">🔍 AI 진단 시작</span>
          <span class="diag-btn-sub">30초 안에 결과를 드려요</span>
        </button>
      </div>

    </div><!-- /inner -->
  </div><!-- /diag-card -->

</div><!-- /scroll-area -->

<!-- Hidden album file input -->
<input type="file" id="albumInput" accept="image/*" style="display:none"
       onchange="handleAlbumFile(this)">

<div class="toast" id="toast"></div>

<script>
'use strict';

/* ── Toast ───────────────────────────── */
let _tt;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(() => t.classList.remove('show'), 2000);
}

/* ── Tabs ────────────────────────────── */
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
  });
});

/* ── Language toggle ─────────────────── */
let curLang = 'ko';
document.getElementById('langBtn').addEventListener('click', () => {
  curLang = curLang === 'ko' ? 'en' : 'ko';
  document.getElementById('lKR').classList.toggle('on', curLang === 'ko');
  document.getElementById('lEN').classList.toggle('on', curLang === 'en');
});

/* ── Camera ──────────────────────────── */
let stream = null;
let facing = 'environment';
const video  = document.getElementById('camVideo');
const camFb  = document.getElementById('camFb');
const secure = location.protocol === 'https:' || ['localhost','127.0.0.1'].includes(location.hostname);

function setFallback(html) {
  video.style.display = 'none';
  camFb.innerHTML = html;
  camFb.style.display = 'flex';
}

async function startCamera(facingMode) {
  if (!secure) {
    setFallback(`<div style="font-size:28px;margin-bottom:8px">📷</div>
      <div>HTTP 환경에서는 앨범만 지원합니다</div>
      <div style="font-size:11px;margin-top:4px;opacity:.7">↓ 아래 앨범 버튼을 사용하세요</div>`);
    return;
  }
  if (!navigator.mediaDevices?.getUserMedia) {
    setFallback('<div>이 브라우저는 카메라를 지원하지 않습니다</div>');
    return;
  }
  try {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode }, audio: false });
    video.srcObject = stream;
    video.style.display = 'block';
    camFb.style.display = 'none';
  } catch (err) {
    const denied = err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError';
    setFallback(denied
      ? `<div style="font-size:28px;margin-bottom:8px">🚫</div>
         <div>카메라 권한이 필요합니다</div>
         <div style="font-size:11px;margin-top:4px;opacity:.7">설정에서 허용 후 새로고침하세요</div>`
      : `<div style="font-size:28px;margin-bottom:8px">⚠️</div>
         <div>카메라를 시작할 수 없습니다</div>
         <div style="font-size:11px;margin-top:4px;opacity:.7">앨범 버튼을 이용하세요</div>`);
  }
}

function flipCamera() {
  facing = facing === 'environment' ? 'user' : 'environment';
  startCamera(facing);
}

function capturePhoto() {
  if (!stream) { showToast('카메라가 준비되지 않았습니다'); return; }
  showToast('사진이 촬영되었습니다');
  // TODO: canvas → base64
}

function openAlbum() { document.getElementById('albumInput').click(); }

function handleAlbumFile(input) {
  if (!input.files[0]) return;
  showToast('이미지가 선택되었습니다');
  // TODO: FileReader → base64
  input.value = '';
}

/* ── Guide frame sizing ──────────────── */
function sizeGuide() {
  const wrap  = document.getElementById('camWrap');
  const guide = document.getElementById('guide');
  const w = wrap.offsetWidth;
  guide.style.width  = Math.round(w * 0.55) + 'px';
  guide.style.height = Math.round(w * 0.55 * 0.75) + 'px';
}

/* ── Crop pills ──────────────────────── */
document.getElementById('pills').addEventListener('click', e => {
  const p = e.target.closest('.pill');
  if (!p) return;
  document.querySelectorAll('.pill').forEach(x => x.classList.remove('on'));
  p.classList.add('on');
});

/* ── Diagnosis start ─────────────────── */
function startDiagnosis() {
  const crop = document.querySelector('.pill.on')?.dataset.crop || '전체';
  showToast(`${crop} 진단을 시작합니다...`);
  // TODO: Edge Function 연결
}

/* ── Pull-to-refresh ─────────────────── */
(function () {
  const area = document.getElementById('scrollArea');
  const ptr  = document.getElementById('ptr');
  const spin = document.getElementById('ptrSpin');
  const icon = document.getElementById('ptrIcon');
  const txt  = document.getElementById('ptrTxt');

  const THRESHOLD = 60;
  let sy = 0, dy = 0, pulling = false, loading = false;

  function set(s) {
    if (s === 'idle') {
      ptr.classList.remove('visible');
      icon.style.display = 'inline';
      icon.classList.remove('flip');
      spin.classList.remove('show');
      txt.textContent = '당겨서 새로고침';
    } else if (s === 'pulling') {
      ptr.classList.add('visible');
      icon.style.display = 'inline';
      icon.classList.remove('flip');
      spin.classList.remove('show');
      txt.textContent = '당겨서 새로고침';
    } else if (s === 'ready') {
      ptr.classList.add('visible');
      icon.style.display = 'inline';
      icon.classList.add('flip');
      spin.classList.remove('show');
      txt.textContent = '놓아서 새로고침';
    } else if (s === 'loading') {
      ptr.classList.add('visible');
      icon.style.display = 'none';
      spin.classList.add('show');
      txt.textContent = '새로고침 중...';
    }
  }

  area.addEventListener('touchstart', e => {
    if (loading) return;
    sy = e.touches[0].clientY;
    pulling = area.scrollTop === 0;
    dy = 0;
  }, { passive: true });

  area.addEventListener('touchmove', e => {
    if (!pulling || loading) return;
    dy = e.touches[0].clientY - sy;
    if (dy <= 0) { set('idle'); return; }
    set(dy >= THRESHOLD ? 'ready' : 'pulling');
  }, { passive: true });

  area.addEventListener('touchend', () => {
    if (!pulling || loading) return;
    pulling = false;
    if (dy >= THRESHOLD) {
      loading = true;
      set('loading');
      setTimeout(() => {
        loading = false;
        set('idle');
        showToast('업데이트 완료');
      }, 1500);
    } else {
      set('idle');
    }
    dy = 0;
  }, { passive: true });
})();

/* ── Init ────────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  sizeGuide();
  startCamera(facing);
});
window.addEventListener('resize', sizeGuide);
</script>
</body>
</html>
