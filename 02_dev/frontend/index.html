<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kFarmAI - 전국 지자체 보조사업 검색</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --deep-green: #0D3E26;
      --neo-orange: #FF6B35;
      --soft-white: #F9F9F8;
      --ink: #111814;
      --muted: #68736D;
      --line: #DDE2DD;
      --panel: #FFFFFF;
      --dead: #A6ADA8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: var(--soft-white);
      color: var(--ink);
      font-family: "Noto Sans KR", system-ui, sans-serif;
      line-height: 1.6;
      letter-spacing: 0;
    }

    a {
      color: inherit;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      background: rgba(249, 249, 248, 0.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      font-weight: 900;
      color: var(--deep-green);
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      background: var(--deep-green);
      color: white;
      font-size: 12px;
      font-weight: 900;
    }

    .brand-ai {
      color: var(--neo-orange);
    }

    .nav-links {
      display: flex;
      gap: 18px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .nav-links a {
      text-decoration: none;
    }

    .hero {
      padding: 64px 28px 32px;
      background: var(--soft-white);
      border-bottom: 1px solid var(--line);
    }

    .hero-inner {
      width: min(1080px, 100%);
      margin: 0 auto;
    }

    .eyebrow {
      color: var(--neo-orange);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    h1 {
      max-width: 760px;
      color: var(--deep-green);
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: 0;
    }

    .hero-copy {
      max-width: 720px;
      margin-top: 18px;
      color: var(--muted);
      font-size: 16px;
      font-weight: 400;
    }

    .search-panel {
      position: sticky;
      top: 64px;
      z-index: 15;
      background: var(--soft-white);
      border-bottom: 1px solid var(--line);
      padding: 18px 28px;
    }

    .search-inner {
      width: min(1080px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(240px, 1fr) 180px auto;
      gap: 10px;
      align-items: center;
    }

    .search-input,
    .category-select {
      width: 100%;
      height: 48px;
      border: 1px solid var(--line);
      background: white;
      color: var(--ink);
      padding: 0 14px;
      font: inherit;
      border-radius: 0;
      outline: none;
    }

    .search-input:focus,
    .category-select:focus {
      border-color: var(--deep-green);
    }

    .search-button {
      height: 48px;
      border: 0;
      background: var(--deep-green);
      color: white;
      padding: 0 24px;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      border-radius: 0;
    }

    .quick-filters {
      width: min(1080px, 100%);
      margin: 12px auto 0;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter-chip {
      border: 1px solid var(--line);
      background: white;
      color: var(--muted);
      padding: 8px 12px;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border-radius: 0;
    }

    .filter-chip.active {
      border-color: var(--neo-orange);
      background: var(--neo-orange);
      color: white;
    }

    .content {
      width: min(1080px, 100%);
      margin: 0 auto;
      padding: 34px 28px 72px;
    }

    .summary-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
    }

    .summary-title {
      color: var(--deep-green);
      font-size: 22px;
      font-weight: 900;
    }

    .summary-meta {
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    .subsidy-list {
      display: grid;
      gap: 14px;
    }

    .subsidy-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      padding: 22px 0;
      border-top: 1px solid var(--line);
      background: transparent;
    }

    .subsidy-item:first-child {
      border-top: 2px solid var(--deep-green);
    }

    .subsidy-item.closed {
      color: var(--dead);
    }

    .subsidy-item.closed .item-title,
    .subsidy-item.closed .item-region,
    .subsidy-item.closed .item-detail {
      color: var(--dead);
    }

    .item-main {
      min-width: 0;
    }

    .item-kicker {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .status {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--line);
      padding: 3px 7px;
      font-size: 11px;
      font-weight: 900;
      color: var(--muted);
      background: white;
    }

    .status.open {
      border-color: var(--neo-orange);
      color: var(--neo-orange);
    }

    .item-title {
      color: var(--ink);
      font-size: 18px;
      line-height: 1.45;
      font-weight: 900;
      text-decoration: none;
    }

    .item-title:hover {
      color: var(--deep-green);
    }

    .item-detail {
      margin-top: 9px;
      max-width: 820px;
      color: var(--muted);
      font-size: 14px;
    }

    .item-footer {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .category-tag {
      color: var(--deep-green);
      font-weight: 900;
    }

    .item-dates {
      min-width: 168px;
      text-align: right;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.8;
    }

    .item-dates strong {
      display: block;
      color: var(--deep-green);
      font-size: 13px;
    }

    .empty-state,
    .loading-state {
      padding: 56px 0;
      border-top: 2px solid var(--deep-green);
      color: var(--muted);
      font-size: 15px;
    }

    .error-state {
      padding: 24px;
      border: 1px solid var(--neo-orange);
      color: var(--deep-green);
      background: white;
    }

    @media (max-width: 760px) {
      .site-header {
        padding: 0 18px;
      }

      .nav-links {
        display: none;
      }

      .hero {
        padding: 42px 20px 26px;
      }

      .search-panel {
        padding: 14px 20px;
      }

      .search-inner {
        grid-template-columns: 1fr;
      }

      .search-button {
        width: 100%;
      }

      .content {
        padding: 28px 20px 72px;
      }

      .summary-row,
      .subsidy-item {
        display: block;
      }

      .summary-meta,
      .item-dates {
        margin-top: 12px;
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="brand" aria-label="kFarmAI 홈">
      <span class="brand-mark">kf</span>
      <span>kFarm<span class="brand-ai">AI</span></span>
    </a>
    <nav class="nav-links" aria-label="주요 메뉴">
      <a href="#subsidyApp">보조사업</a>
      <a href="map.html">농약사 지도</a>
      <a href="#subsidyApp">정책 데이터</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="hero-inner">
        <div class="eyebrow">KFARMAI SUBSIDY DATABASE</div>
        <h1>전국 지자체 농업 보조사업을 한 곳에서 검색합니다.</h1>
        <p class="hero-copy">
          지역명, 사업명, 카테고리로 지자체 고시·공고를 빠르게 좁혀보세요.
          진행 중인 공고를 먼저 보여주고, 마감된 공고는 흐리게 처리합니다.
        </p>
      </div>
    </section>

    <section class="search-panel" aria-label="보조사업 검색">
      <div class="search-inner">
        <input id="subsidySearchInput" class="search-input" type="search" placeholder="지역명 또는 키워드 입력 예: 순천, 상토, 비료" autocomplete="off">
        <select id="subsidyCategorySelect" class="category-select" aria-label="카테고리 선택">
          <option value="전체">전체 카테고리</option>
          <option value="상토 지원">상토 지원</option>
          <option value="비료 지원">비료 지원</option>
          <option value="종자 지원">종자 지원</option>
          <option value="농약 지원">농약 지원</option>
          <option value="농기계 지원">농기계 지원</option>
          <option value="기타">기타</option>
        </select>
        <button id="subsidySearchButton" class="search-button" type="button">검색</button>
      </div>
      <div id="subsidyQuickFilters" class="quick-filters" aria-label="빠른 필터"></div>
    </section>

    <section id="subsidyApp" class="content">
      <div class="summary-row">
        <div>
          <div class="eyebrow">LIVE DATA</div>
          <h2 class="summary-title">보조사업 공고</h2>
        </div>
        <div id="subsidySummary" class="summary-meta">데이터 로딩 중</div>
      </div>
      <div id="subsidyList" class="subsidy-list">
        <div class="loading-state">전국 보조사업 데이터를 불러오는 중입니다.</div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
