<script src="static/seed_data.js"></script>
<script>
const CHO = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
function getInitials(text) {
  return String(text || '').split('').map(ch => {
    const code = ch.charCodeAt(0) - 44032;
    return code >= 0 && code <= 11171 ? CHO[Math.floor(code / 588)] : ch;
  }).join('');
}
function matchesKeyword(item, kw) {
  if (!kw) return true;
  const needle = String(kw).toLowerCase().replace(/\s+/g, '');
  const hay = [item.company, item.products, item.addr].join(' ').toLowerCase().replace(/\s+/g, '');
  return hay.includes(needle) || getInitials(hay).includes(needle);
}
function renderCards(list) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  list.forEach(item => {
    const prods = item.products.split(',').map(p => p.trim()).filter(p => p);
    const tags = prods.slice(0, 7).map(p => `<span class="kf-tag kf-tag-blue">${p}</span>`).join('');
    const more = prods.length > 7 ? `<span class="kf-tag kf-tag-blue">+${prods.length-7}</span>` : '';
    const hp = item.homepage
      ? `<a href="${item.homepage}" target="_blank" class="kf-homepage-btn">홈페이지 →</a>`
      : `<span style="font-size:11px;color:#ccc;">홈페이지 없음</span>`;
    grid.innerHTML += `
      <div class="kf-company-card">
        <div class="kf-company-header">
          <div class="kf-company-name">${item.company}</div>
          ${hp}
        </div>
        <div class="kf-company-info">
          <span>👤 대표: ${item.ceo}</span>
          <span>📞 ${item.tel}</span>
          <span>📍 ${item.addr}</span>
        </div>
        <div class="kf-products">${tags}${more}</div>
      </div>`;
  });
  document.getElementById('count').textContent = list.length + '개 회사';
}
function search() {
  const kw = document.getElementById('keyword').value.trim();
  renderCards(seedData.filter(d => matchesKeyword(d, kw)));
}
function resetSearch() {
  document.getElementById('keyword').value = '';
  renderCards(seedData);
}
function applyUrlQuery() {
  const q = new URLSearchParams(window.location.search).get('q');
  if (!q) return;
  document.getElementById('keyword').value = q;
  search();
}
function openMenu() {
  document.getElementById('overlay').classList.add('open');
  document.getElementById('menu').classList.add('open');
}
function closeMenu() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('menu').classList.remove('open');
}
renderCards(seedData);
applyUrlQuery();
</script>
