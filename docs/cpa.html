<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>농약회사 정보 - kfarmai</title>
<link rel="stylesheet" href="style.css">
<style>
.kf-company-card { border-top-color: #e53e3e; }
.kf-homepage-btn { background: #fff0f0; color: #c0392b; }
.kf-homepage-btn:hover { background: #ffd5d5; }
.grade-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 700;
  margin-bottom: 8px;
}
.grade-regular { background: #c0392b; color: white; }
.grade-associate { background: #e8e8e8; color: #555; }
</style>
</head>
<body>

<header style="position:sticky;top:0;z-index:50;background:rgba(255,255,255,0.9);backdrop-filter:blur(8px);border-bottom:1px solid #f0f0f0;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;">
  <a href="index.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
    <img src="static/logo.png" alt="kFarmAI" style="width:36px;height:36px;border-radius:8px;object-fit:cover;">
    <div style="line-height:1;">
      <div style="font-size:18px;font-weight:900;letter-spacing:-0.5px;"><span style="color:#0F4C43;">kFarm</span><span style="color:#FF6B35;">AI</span></div>
      <div style="font-size:9px;letter-spacing:1.5px;color:#9ca3af;font-weight:600;text-transform:uppercase;margin-top:1px;">Agricultural AI Hub</div>
    </div>
  </a>
  <button style="width:40px;height:40px;border-radius:50%;border:none;background:none;cursor:pointer;font-size:20px;" onclick="openMenu()">☰</button>
</header>

<div style="padding:16px 20px 8px;background:white;border-bottom:1px solid #e8e8e8;">
  <div style="font-size:10px;letter-spacing:2px;color:#666;margin-bottom:4px;">CPA MEMBER</div>
  <div style="font-size:20px;font-weight:900;letter-spacing:-0.5px;">농약회사 정보</div>
</div>

<div class="kf-search-bar">
  <select id="grade" onchange="search()" style="min-width:90px;">
    <option value="">전체</option>
    <option value="정회원">정회원</option>
    <option value="준회원">준회원</option>
  </select>
  <input type="text" id="keyword" placeholder="회사명 검색"
         onkeypress="if(event.keyCode==13) search()"
         style="flex:1;min-width:120px;">
  <button class="kf-btn kf-btn-primary" onclick="search()">검색</button>
  <button class="kf-btn kf-btn-gray" onclick="resetSearch()">초기화</button>
  <span id="count" style="font-size:13px;color:#666;"></span>
</div>

<div class="kf-company-grid" id="grid"></div>

<div style="text-align:center;padding:12px;font-size:11px;color:#aaa;">
  출처: 한국작물보호협회 (koreacpa.org) | © 2026 kfarmai.com
</div>

<nav class="kf-bottom-nav">
  <a href="index.html" class="kf-nav-item"><span class="kf-nav-icon">🏠</span><span>홈</span></a>
  <a href="index.html#subsidy" class="kf-nav-item"><span class="kf-nav-icon">📋</span><span>보조사업</span></a>
  <a href="map.html" class="kf-nav-item"><span class="kf-nav-icon">🗺️</span><span>농약사</span></a>
  <a href="santo.html" class="kf-nav-item"><span class="kf-nav-icon">🌱</span><span>상토</span></a>
  <a href="seed.html" class="kf-nav-item"><span class="kf-nav-icon">🌾</span><span>종자</span></a>
</nav>

<div class="kf-overlay" id="overlay" onclick="closeMenu()"></div>
<div class="kf-menu" id="menu">
  <div class="kf-menu-header">
    <a href="index.html" class="kf-logo">
      <div class="kf-logo-mark">kf</div>
      <span class="kf-logo-text">kfarm<em>ai</em></span>
    </a>
    <button class="kf-menu-close" onclick="closeMenu()">✕</button>
  </div>
  <a href="index.html" class="kf-menu-item">홈</a>
  <a href="index.html#subsidy" class="kf-menu-item">보조사업 공고</a>
  <a href="map.html" class="kf-menu-item">농약사 찾기 🗺️</a>
  <a href="santo.html" class="kf-menu-item">상토회사 정보 🌱</a>
  <a href="seed.html" class="kf-menu-item">종자회사 정보 🌾</a>
  <a href="cpa.html" class="kf-menu-item">농약회사 정보 🧪</a>
  <a href="links.html" class="kf-menu-item">농업관련 사이트 🔗</a>
</div>

<script src="static/cpa_data.js"></script>
<script>
function renderCards(list) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  list.forEach(item => {
    const badgeClass = item.grade === '정회원' ? 'grade-regular' : 'grade-associate';
    const hp = item.homepage
      ? `<a href="${item.homepage}" target="_blank" class="kf-homepage-btn">홈페이지 →</a>`
      : `<span style="font-size:11px;color:#ccc;">홈페이지 없음</span>`;
    grid.innerHTML += `
      <div class="kf-company-card">
        <div style="margin-bottom:8px;">
          <span class="grade-badge ${badgeClass}">${item.grade}</span>
        </div>
        <div class="kf-company-header">
          <div class="kf-company-name">${item.company}</div>
          ${hp}
        </div>
        <div class="kf-company-info">
          ${item.ceo ? `<span>👤 대표: ${item.ceo}</span>` : ''}
          ${item.tel ? `<span>📞 ${item.tel}</span>` : ''}
          ${item.addr ? `<span>📍 ${item.addr}</span>` : ''}
        </div>
      </div>`;
  });
  document.getElementById('count').textContent = list.length + '개 회사';
}

function search() {
  const grade = document.getElementById('grade').value;
  const kw = document.getElementById('keyword').value.trim();
  renderCards(cpaData.filter(d =>
    (!grade || d.grade === grade) &&
    (!kw || d.company.includes(kw))
  ));
}

function resetSearch() {
  document.getElementById('grade').value = '';
  document.getElementById('keyword').value = '';
  renderCards(cpaData);
}

function applyUrlQuery() {
  const q = new URLSearchParams(window.location.search).get('q');
  if (!q) return;
  document.getElementById('keyword').value = q;
  search();
}

function openMenu() {
  document.getElementById('overlay').classList.add('open');
  document.getElementById('menu').classList.add('open');
}
function closeMenu() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('menu').classList.remove('open');
}

renderCards(cpaData);
applyUrlQuery();
</script>
</body>
</html>
