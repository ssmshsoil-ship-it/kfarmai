<head>

<style>
  :root {
    --green:#1D9E75;
    --green-dark:#14795A;
    --orange:#FF6B2B;
    --text:#171717;
    --sub:#666;
    --muted:#9CA3AF;
    --bg:#F7F8F6;
    --card:#fff;
    --border:#E5E7EB;
    --shadow:0 10px 28px rgba(0,0,0,.08);
  }
  * { box-sizing:border-box; }
  html, body { margin:0; min-height:100%; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif; }
  body { padding-bottom:78px; }
  button, input, textarea { font-family:inherit; }
  a { color:inherit; text-decoration:none; }
  .app { max-width:520px; min-height:100vh; margin:0 auto; background:var(--bg); position:relative; }
  .header { position:sticky; top:0; z-index:50; background:rgba(255,255,255,.94); backdrop-filter:blur(14px); border-bottom:1px solid rgba(0,0,0,.06); padding:10px 14px 12px; }
  .top { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .back { width:36px; height:36px; border:0; border-radius:50%; background:#F3F4F6; color:#222; font-size:20px; font-weight:900; cursor:pointer; }
  .brand { display:flex; align-items:center; gap:8px; min-width:0; }
  .brand img { width:34px; height:34px; object-fit:contain; flex:0 0 auto; }
  .brand-name { font-size:18px; line-height:1; font-weight:800; letter-spacing:-.5px; }
  .brand-name .ai { color:var(--orange); }
  .brand-sub { margin-top:2px; font-size:8px; line-height:1; letter-spacing:1.4px; color:#9CA3AF; font-weight:800; }
  .channel-title { margin-left:auto; max-width:145px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; font-size:13px; font-weight:900; color:var(--green); }
  .search { height:42px; display:flex; align-items:center; gap:8px; background:#F3F4F6; border:1px solid #ECEFF1; border-radius:999px; padding:0 13px; }
  .search svg { width:18px; height:18px; color:var(--green); }
  .search input { flex:1; min-width:0; border:0; outline:0; background:transparent; font-size:14px; }
  .content { padding:14px; }
  .card { background:var(--card); border:1px solid rgba(0,0,0,.06); border-radius:16px; padding:16px; box-shadow:0 4px 14px rgba(0,0,0,.04); }
  .badge { display:inline-flex; align-items:center; height:24px; padding:0 9px; border-radius:8px; background:rgba(29,158,117,.12); color:var(--green-dark); font-size:12px; font-weight:900; }
  .badge.blue { background:#E8F1FF; color:#2563EB; }
  .badge.orange { background:#FFF1E8; color:#EA580C; }
  .badge.teal { background:#E6FFFA; color:#0F766E; }
  .ai-badge { display:inline-flex; align-items:center; height:20px; padding:0 7px; border-radius:999px; background:#FFF1E8; color:#EA580C; font-size:10px; font-weight:900; margin-left:5px; }
  .post-title { margin:12px 0 8px; font-size:22px; line-height:1.32; font-weight:900; color:#111; }
  .meta { display:flex; flex-wrap:wrap; gap:8px; color:#8A8A8A; font-size:12px; font-weight:700; }
  .post-body { margin-top:18px; color:#333; font-size:15px; line-height:1.68; white-space:pre-wrap; word-break:break-word; }
  .image-grid { display:grid; grid-template-columns:1fr; gap:10px; margin-top:16px; }
  .post-image { width:100%; max-height:420px; object-fit:cover; border-radius:14px; border:1px solid var(--border); background:#F3F4F6; }
  .actions { display:flex; align-items:center; gap:10px; margin-top:18px; padding-top:14px; border-top:1px solid var(--border); }
  .stat { color:#777; font-size:13px; font-weight:800; }
  .like-btn { margin-left:auto; height:38px; padding:0 14px; border:1px solid rgba(29,158,117,.25); border-radius:999px; background:rgba(29,158,117,.08); color:var(--green-dark); font-size:13px; font-weight:900; cursor:pointer; }
  .like-btn.on { background:var(--green); color:#fff; }
  .section { margin-top:14px; }
  .section-head { display:flex; align-items:center; justify-content:space-between; margin:0 2px 10px; }
  .section-title { font-size:16px; font-weight:900; }
  .comment { background:#fff; border:1px solid rgba(0,0,0,.06); border-radius:14px; padding:13px; margin:8px 0; }
  .comment-head { display:flex; align-items:center; gap:6px; color:#777; font-size:12px; font-weight:800; margin-bottom:7px; }
  .comment-body { color:#333; font-size:14px; line-height:1.55; white-space:pre-wrap; word-break:break-word; }
  .comment-form { background:#fff; border:1px solid rgba(0,0,0,.06); border-radius:14px; padding:12px; margin-top:10px; }
  .comment-form textarea { width:100%; min-height:80px; border:1.5px solid var(--border); border-radius:12px; outline:0; padding:11px 12px; font-size:14px; resize:vertical; }
  .comment-form textarea:focus { border-color:var(--green); }
  .comment-submit { width:100%; height:42px; margin-top:8px; border:0; border-radius:12px; background:var(--green); color:#fff; font-size:14px; font-weight:900; cursor:pointer; }
  .comment-submit:disabled { opacity:.55; cursor:not-allowed; }
  .related-card { display:block; background:#fff; border:1px solid rgba(0,0,0,.06); border-radius:14px; padding:13px; margin:8px 0; }
  .related-title { font-size:14px; font-weight:900; margin:7px 0 6px; line-height:1.35; }
  .related-meta { color:#8A8A8A; font-size:11px; font-weight:700; }
  .empty, .loading { color:#777; text-align:center; padding:42px 20px; font-size:14px; line-height:1.6; }
  .spinner { display:inline-block; width:24px; height:24px; border:3px solid rgba(29,158,117,.18); border-top-color:var(--green); border-radius:50%; animation:spin .8s linear infinite; vertical-align:middle; margin-right:8px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .bottom-nav { position:fixed; left:50%; bottom:0; transform:translateX(-50%); z-index:50; width:100%; max-width:520px; height:66px; display:flex; background:rgba(255,255,255,.97); border-top:1px solid var(--border); backdrop-filter:blur(14px); }
  .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; color:#9CA3AF; font-size:10px; font-weight:800; cursor:pointer; border:0; background:transparent; }
  .nav-item svg { width:22px; height:22px; }
  .nav-item.active { color:var(--green); }
  .modal-overlay { position:fixed; inset:0; z-index:100; display:none; align-items:flex-end; justify-content:center; background:rgba(0,0,0,.38); }
  .modal-overlay.open { display:flex; }
  .modal { width:100%; max-width:520px; background:#fff; border-radius:22px 22px 0 0; padding:18px 18px 24px; box-shadow:var(--shadow); }
  .modal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .modal-title { font-size:18px; font-weight:900; }
  .modal-close { width:34px; height:34px; border:0; border-radius:50%; background:#F3F4F6; font-size:18px; cursor:pointer; }
  .login-box { text-align:center; padding:12px 4px 4px; }
  .login-box strong { display:block; font-size:18px; margin-bottom:6px; }
  .login-box p { margin:0 0 16px; color:#777; font-size:13px; }
  .google { width:100%; height:48px; border:1px solid var(--border); border-radius:13px; background:#fff; font-size:15px; font-weight:900; cursor:pointer; }
  .toast { position:fixed; left:50%; bottom:84px; transform:translateX(-50%); z-index:200; background:#111; color:#fff; border-radius:999px; padding:11px 16px; font-size:13px; font-weight:800; opacity:0; pointer-events:none; transition:opacity .2s; }
  .toast.show { opacity:1; }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://xzetqijeucldbfgjuoes.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6ZXRxaWpldWNsZGJmZ2p1b2VzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NjIwODYsImV4cCI6MjA5NTEzODA4Nn0.QAizDLXQC1DrRi5C0sPahK6s_-6X4zkTEjzJZ6CFprw';
const CHANNEL_CONFIG = {
  'plant-hospital': '식물 병원',
  'plant-question': '식물 질문방',
  'crop-consult': '작물 상담방',
  'plant-brag': '내 식물 자랑',
  'farmer-lounge': '농부 사랑방',
  'plant-share': '식물 나눔·직거래',
  'garden-class': '원예 클래스',
  'plant-meet': '식집사 모임'
};
const CHANNEL_BADGE_COLORS = {'plant-question':'blue','crop-consult':'orange','plant-share':'teal'};
const params = new URLSearchParams(location.search);
const postId = params.get('id') || '';
let sb;
let currentUser = null;
let currentPost = null;
let localLiked = false;

document.addEventListener('DOMContentLoaded', init);

async function init() {
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const { data: authData } = await sb.auth.getUser();
  currentUser = authData?.user || null;
  if (!postId) {
    document.getElementById('postArea').innerHTML = '<div class="empty">게시글 ID가 없습니다.</div>';
    document.getElementById('commentList').innerHTML = '<div class="empty">댓글을 표시할 수 없습니다.</div>';
    document.getElementById('relatedList').innerHTML = '<div class="empty">관련 글을 표시할 수 없습니다.</div>';
    return;
  }
  await loadPost();
  await Promise.all([loadComments(), loadRelatedPosts()]);
}

async function loadPost() {
  try {
    const { data, error } = await sb
      .from('posts')
      .select('*, channels(name, slug)')
      .eq('id', postId)
      .single();
    if (error) throw error;
    currentPost = data;
    renderPost(data);
    incrementViewCount(data);
  } catch (err) {
    document.getElementById('postArea').innerHTML = '<div class="empty">게시글을 찾을 수 없습니다.<br>삭제되었거나 접근 권한이 없을 수 있습니다.</div>';
    document.getElementById('commentList').innerHTML = '<div class="empty">댓글을 표시할 수 없습니다.</div>';
    document.getElementById('relatedList').innerHTML = '<div class="empty">관련 글을 표시할 수 없습니다.</div>';
  }
}

function renderPost(post) {
  const slug = post.channels?.slug || '';
  const channelNameValue = post.channels?.name || channelName(slug);
  document.getElementById('channelTitle').textContent = channelNameValue;
  document.title = `${post.title || '게시글'} - kFarmAI`;
  const images = normalizeImages(post.image_urls);
  const imageHtml = images.length ? `<div class="image-grid">${images.map(url => `<img class="post-image" src="${escAttr(url)}" alt="게시글 이미지" loading="lazy">`).join('')}</div>` : '';
  document.getElementById('postArea').innerHTML = `
    <article class="card">
      <span class="badge ${CHANNEL_BADGE_COLORS[slug] || ''}">${esc(channelNameValue)}</span>
      <h1 class="post-title">${esc(post.title || '제목 없음')}</h1>
      <div class="meta">
        <span>${post.user_id ? '회원' : '익명'} 작성자</span>
        <span>${post.region_tag ? '#' + esc(post.region_tag) : '지역 미지정'}</span>
        <span>${timeAgo(post.created_at)}</span>
      </div>
      <div class="post-body">${esc(post.content || '')}</div>
      ${imageHtml}
      <div class="actions">
        <span class="stat">조회 ${Number(post.view_count || 0).toLocaleString('ko-KR')}</span>
        <button class="like-btn" id="likeBtn" type="button" onclick="toggleLike()">좋아요 ${Number(post.like_count || 0).toLocaleString('ko-KR')}</button>
      </div>
    </article>`;
}

async function incrementViewCount(post) {
  const nextCount = Number(post.view_count || 0) + 1;
  try {
    await sb.from('posts').update({ view_count: nextCount }).eq('id', post.id);
  } catch (_) {
    // RLS 정책상 업데이트가 막혀도 상세 조회는 계속 동작해야 한다.
  }
}

async function loadComments() {
  try {
    const { data, error } = await sb
      .from('comments')
      .select('*')
      .eq('post_id', postId)
      .order('created_at', { ascending:true });
    if (error) throw error;
    renderComments(data || []);
  } catch (err) {
    document.getElementById('commentList').innerHTML = '<div class="empty">댓글을 불러오지 못했습니다.</div>';
  }
}

function renderComments(comments) {
  document.getElementById('commentCount').textContent = comments.length;
  const list = document.getElementById('commentList');
  if (!comments.length) {
    list.innerHTML = '<div class="empty">아직 댓글이 없습니다.<br>첫 댓글을 남겨보세요.</div>';
    return;
  }
  list.innerHTML = comments.map(comment => `
    <article class="comment">
      <div class="comment-head">
        <span>${comment.user_id ? '회원' : '익명'}</span>
        ${comment.is_ai ? '<span class="ai-badge">AI</span>' : ''}
        <span>${timeAgo(comment.created_at)}</span>
      </div>
      <div class="comment-body">${esc(comment.content || '')}</div>
    </article>`).join('');
}

async function submitComment() {
  const content = document.getElementById('commentInput').value.trim();
  if (!content) return showToast('댓글 내용을 입력해주세요.');
  const { data } = await sb.auth.getUser();
  currentUser = data?.user || null;
  if (!currentUser) return openLoginModal();
  const btn = document.getElementById('commentSubmit');
  btn.disabled = true;
  try {
    const { error } = await sb.from('comments').insert({ post_id:postId, user_id:currentUser.id, content });
    if (error) throw error;
    document.getElementById('commentInput').value = '';
    showToast('댓글이 등록되었습니다.');
    loadComments();
  } catch (err) {
    showToast(err.message || '댓글 등록에 실패했습니다.');
  } finally {
    btn.disabled = false;
  }
}

async function loadRelatedPosts() {
  if (!currentPost?.channel_id) {
    document.getElementById('relatedList').innerHTML = '<div class="empty">관련 글이 없습니다.</div>';
    return;
  }
  try {
    const { data, error } = await sb
      .from('posts')
      .select('id,title,created_at,region_tag,channels(name, slug)')
      .eq('channel_id', currentPost.channel_id)
      .neq('id', postId)
      .order('created_at', { ascending:false })
      .limit(3);
    if (error) throw error;
    renderRelatedPosts(data || []);
  } catch (err) {
    document.getElementById('relatedList').innerHTML = '<div class="empty">관련 글을 불러오지 못했습니다.</div>';
  }
}

function renderRelatedPosts(posts) {
  const list = document.getElementById('relatedList');
  if (!posts.length) {
    list.innerHTML = '<div class="empty">같은 채널의 최근 글이 없습니다.</div>';
    return;
  }
  list.innerHTML = posts.map(post => {
    const slug = post.channels?.slug || '';
    return `<a class="related-card" href="post.html?id=${encodeURIComponent(post.id)}">
      <span class="badge ${CHANNEL_BADGE_COLORS[slug] || ''}">${esc(post.channels?.name || channelName(slug))}</span>
      <div class="related-title">${esc(post.title || '제목 없음')}</div>
      <div class="related-meta">${post.region_tag ? '#' + esc(post.region_tag) + ' · ' : ''}${timeAgo(post.created_at)}</div>
    </a>`;
  }).join('');
}

function toggleLike() {
  const btn = document.getElementById('likeBtn');
  if (!btn || !currentPost) return;
  localLiked = !localLiked;
  const base = Number(currentPost.like_count || 0);
  btn.classList.toggle('on', localLiked);
  btn.textContent = `좋아요 ${(base + (localLiked ? 1 : 0)).toLocaleString('ko-KR')}`;
}

function runSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (q) location.href = `index.html?q=${encodeURIComponent(q)}`;
}

function goBack() {
  if (history.length > 1) history.back();
  else location.href = 'channel.html';
}

function openLoginModal() { document.getElementById('loginModal').classList.add('open'); }
function closeLoginModal() { document.getElementById('loginModal').classList.remove('open'); }

async function loginGoogle() {
  const { error } = await sb.auth.signInWithOAuth({ provider:'google', options:{ redirectTo:location.href } });
  if (error) showToast('로그인 실패: ' + error.message);
}

function channelName(slug) { return CHANNEL_CONFIG[slug] || '일반'; }
function normalizeImages(value) {
  if (!value) return [];
  if (Array.isArray(value)) return value.filter(Boolean);
  if (typeof value === 'string') {
    try {
      const parsed = JSON.parse(value);
      return Array.isArray(parsed) ? parsed.filter(Boolean) : [value].filter(Boolean);
    } catch (_) {
      return value.split(',').map(v => v.trim()).filter(Boolean);
    }
  }
  return [];
}
function esc(value) {
  return String(value || '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function escAttr(value) { return esc(value).replace(/`/g, '&#96;'); }
function timeAgo(dateValue) {
  if (!dateValue) return '';
  const diff = Date.now() - new Date(dateValue).getTime();
  const min = Math.floor(diff / 60000);
  if (min < 1) return '방금';
  if (min < 60) return `${min}분 전`;
  const hour = Math.floor(min / 60);
  if (hour < 24) return `${hour}시간 전`;
  const day = Math.floor(hour / 24);
  if (day < 7) return `${day}일 전`;
  return new Date(dateValue).toLocaleDateString('ko-KR');
}
function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1800);
}
